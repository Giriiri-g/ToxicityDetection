<div class="fp-shell">
  <div class="fp-card">
    <div class="fp-title">Forgot password</div>
    <div class="fp-subtitle">Enter your email/username to receive reset instructions.</div>

    <form class="fp-form" (ngSubmit)="$event.preventDefault()">
      <label class="fp-label" for="identifier">Email or username</label>
      <input class="fp-input" id="identifier" name="identifier" type="text" required placeholder="Your email or username" />

      <button class="fp-button" type="submit">Send reset link</button>

      <div class="fp-actions">
        <a class="fp-link" routerLink="/signin">Back to sign in</a>
      </div>
    </form>
  </div>
</div>
