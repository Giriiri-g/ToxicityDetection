<aside class="feed-sidebar">
  <!-- User Profile Summary -->
  <div class="feed-sidebar__profile">
    <img [src]="currentUser.avatarUrl" [alt]="currentUser.displayName" class="feed-sidebar__avatar">
    <div class="feed-sidebar__user-info">
      <span class="feed-sidebar__display-name">{{ currentUser.displayName }}</span>
      <span class="feed-sidebar__username">&#64;{{ currentUser.username }}</span>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="feed-sidebar__nav">
    <a *ngFor="let item of menuItems" [routerLink]="item.route" class="feed-sidebar__link" [class.feed-sidebar__link--active]="item.active">
      <svg class="feed-sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <!-- Home Icon -->
        <g *ngIf="item.icon === 'home'">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </g>
        <!-- User Icon -->
        <g *ngIf="item.icon === 'user'">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </g>
        <!-- Bell Icon -->
        <g *ngIf="item.icon === 'bell'">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </g>
        <!-- Message Icon -->
        <g *ngIf="item.icon === 'message'">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </g>
        <!-- Bookmark Icon -->
        <g *ngIf="item.icon === 'bookmark'">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </g>
        <!-- Settings Icon -->
        <g *ngIf="item.icon === 'settings'">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </g>
      </svg>
      <span class="feed-sidebar__label">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Toxicity Filter Widget -->
  <div class="feed-sidebar__filter">
    <h3 class="feed-sidebar__filter-title">Toxicity Filter</h3>
    <p class="feed-sidebar__filter-desc">Hide content above {{ currentUser.toxicityThreshold }}% toxicity</p>
    <div class="filter-slider">
      <div class="filter-slider__track">
        <div class="filter-slider__fill" [style.width.%]="currentUser.toxicityThreshold"></div>
      </div>
      <span class="filter-slider__value">{{ currentUser.toxicityThreshold }}%</span>
    </div>
  </div>

  <!-- Logout -->
  <button class="feed-sidebar__logout" (click)="onLogout()">
    <svg class="feed-sidebar__logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline>
      <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
    Logout
  </button>
</aside>
