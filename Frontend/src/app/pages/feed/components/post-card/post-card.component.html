<article class="post-card">
  <!-- Header -->
  <header class="post-card__header">
    <div class="post-card__author">
      <img [src]="post.author.avatarUrl" [alt]="post.author.displayName" class="post-card__avatar">
      <div class="post-card__author-info">
        <span class="post-card__display-name">{{ post.author.displayName }}</span>
        <span class="post-card__username">&#64;{{ post.author.username }}</span>
      </div>
    </div>
    <div class="post-card__meta">
      <span class="post-card__time">{{ formatTime(post.createdAt) }}</span>
      <span class="post-card__badge" [class]="'badge ' + getToxicityBadgeClass(post.toxicityScore)">
        {{ getToxicityLabel(post.toxicityScore) }}
        <span class="badge__score">{{ post.toxicityScore }}%</span>
      </span>
    </div>
  </header>

  <!-- Content -->
  <div class="post-card__content">
    <p class="post-card__text">{{ post.content }}</p>
    <img *ngIf="post.imageUrl" [src]="post.imageUrl" alt="Post image" class="post-card__image">
  </div>

  <!-- Actions -->
  <footer class="post-card__actions">
    <button class="action-btn" [class.action-btn--active]="post.isLiked" (click)="onLikeToggle()">
      <svg class="action-btn__icon" [class.action-btn__icon--filled]="post.isLiked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span class="action-btn__count">{{ post.likesCount }}</span>
    </button>

    <button class="action-btn" (click)="toggleComments()">
      <svg class="action-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
      <span class="action-btn__count">{{ post.commentsCount }}</span>
    </button>

    <button class="action-btn">
      <svg class="action-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
        <polyline points="16 6 12 2 8 6"></polyline>
        <line x1="12" y1="2" x2="12" y2="15"></line>
      </svg>
      <span class="action-btn__count">{{ post.sharesCount }}</span>
    </button>
  </footer>

  <!-- Comments Section -->
  <div class="post-card__comments" *ngIf="showComments">
    <div class="comment-input">
      <img [src]="currentUser.avatarUrl" [alt]="currentUser.displayName" class="comment-input__avatar">
      <div class="comment-input__wrap">
        <textarea [(ngModel)]="newCommentText" placeholder="Write a comment..." rows="2"></textarea>
        <button class="comment-input__submit" (click)="addComment()" [disabled]="!newCommentText.trim()">
          Post
        </button>
      </div>
    </div>

    <div class="comments-list" *ngIf="post.comments?.length">
      <app-comment *ngFor="let comment of post.comments" [comment]="comment" [currentUser]="currentUser" (replyAdded)="onNestedReply($event)" (likeToggle)="comment.likesCount = $event.isLiked ? comment.likesCount - 1 : comment.likesCount + 1; comment.isLiked = !$event.isLiked">
      </app-comment>
    </div>
  </div>
</article>
