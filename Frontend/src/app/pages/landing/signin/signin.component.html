<div class="signin-card">

    <div class="signin-card__header">
        <h1 class="signin-card__title">Sign in to<br>your account</h1>
        <p class="signin-card__sub">Enter your username, email, or mobile number to get started.</p>
    </div>

    <div class="signin-card__body">

        <!-- Identifier field -->
        <div class="field" [class.field--error]="identifierError">
            <label class="field__label" for="identifier">Username, email, mobile</label>
            <input id="identifier" class="field__input" type="text" autocomplete="username" [(ngModel)]="identifier"
                (blur)="validateIdentifier()" placeholder=" " />
            <span class="field__error" *ngIf="identifierError">{{ identifierError }}</span>
        </div>

        <!-- Password field -->
        <div class="field" [class.field--error]="passwordError">
            <label class="field__label" for="password">Password</label>
            <div class="field__input-wrap">
                <input id="password" class="field__input field__input--padded"
                    [type]="showPassword ? 'text' : 'password'" autocomplete="current-password" [(ngModel)]="password"
                    (blur)="validatePassword()" placeholder=" " />
                <button type="button" class="field__toggle" (click)="togglePassword()"
                    [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                    <!-- Eye open -->
                    <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <!-- Eye off -->
                    <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                </button>
            </div>
            <span class="field__error" *ngIf="passwordError">{{ passwordError }}</span>
        </div>

        <div class="signin-card__forgot">
            <a href="#" class="link">Forgot password?</a>
        </div>

        <!-- Continue button -->
        <button class="btn btn--primary" [class.btn--loading]="isLoading" [disabled]="isLoading" (click)="onContinue()">
            <span class="btn__label">{{ isLoading ? 'Signing in…' : 'Continue' }}</span>
            <svg *ngIf="isLoading" class="btn__spinner" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5">
                <path
                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
            </svg>
        </button>

        <!-- Divider -->
        <div class="divider"><span class="divider__label">OR</span></div>

        <!-- Create account -->
        <button class="btn btn--dark" (click)="onCreateAccount($event)">
            Create Account
        </button>

    </div>
</div>
