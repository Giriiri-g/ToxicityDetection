<section class="hero">
  <!-- Background texture layer -->
  <div class="hero__bg-grid"></div>
  <div class="hero__bg-glow hero__bg-glow--left"></div>
  <div class="hero__bg-glow hero__bg-glow--right"></div>

  <!-- Shield badge -->
  <div class="hero__badge">
    <span class="hero__badge-dot"></span>
    Protective Shield Active
  </div>

  <!-- Headline -->
  <div class="hero__headline-wrap">
    <h1 class="hero__headline">
      <span class="hero__headline-top">Connecting Teams</span>
      <span class="hero__headline-accent">Across Block</span>
    </h1>
    <p class="hero__sub">
        Bringing teams together across every block of H&R Block.
    </p>
  </div>

  <!-- Live Stats Grid -->
  <div class="hero__stats">
    @for (stat of stats; track stat.label) {
      <div class="hero__stat-card">
        <div class="hero__stat-shimmer"></div>
        <span class="hero__stat-value">{{ getDisplayValue(stat) }}</span>
        <span class="hero__stat-label">{{ stat.label }}</span>
        <div class="hero__stat-bar"></div>
      </div>
    }
  </div>

  <!-- Live indicator
  <div class="hero__live-row">
    <span class="hero__live-pulse"></span>
    <span class="hero__live-text">Live community metrics — updated every 3 seconds</span>
  </div> -->

  <!-- CTAs -->
  <div class="hero__actions">
    <button class="hero__cta hero__cta--primary" (click)="JoinTheDiscussion($event)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Join the Discussion
    </button>
    <button class="hero__cta hero__cta--ghost">
      See how moderation works
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</section>
