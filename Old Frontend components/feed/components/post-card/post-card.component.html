<article class="reddit-post">
  <!-- Vote Column -->
  <div class="reddit-post__votes">
    <button class="reddit-post__vote-btn reddit-post__vote-btn--up" [class.reddit-post__vote-btn--active]="post.isLiked" (click)="onLikeToggle()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>
    <span class="reddit-post__vote-count">{{ post.likesCount }}</span>
    <button class="reddit-post__vote-btn reddit-post__vote-btn--down" (click)="onLikeToggle()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </button>
  </div>

  <!-- Content -->
  <div class="reddit-post__content">
    <!-- Header -->
    <header class="reddit-post__header">
      <img [src]="post.author.avatarUrl" [alt]="post.author.displayName" class="reddit-post__author-avatar">
      <span class="reddit-post__author-name">{{ post.author.displayName }}</span>
      <span class="reddit-post__separator">•</span>
      <span class="reddit-post__time">{{ formatTime(post.createdAt) }}</span>
      <span class="reddit-post__separator">•</span>
      <span class="reddit-post__badge" [class]="'reddit-post__badge--' + getToxicityBadgeClass(post.toxicityScore)">
        {{ getToxicityLabel(post.toxicityScore) }}
      </span>
    </header>

    <!-- Body -->
    <div class="reddit-post__body">
      <p class="reddit-post__text">{{ post.content }}</p>
      <img *ngIf="post.imageUrl" [src]="post.imageUrl" alt="Post image" class="reddit-post__image">
    </div>

    <!-- Footer Actions -->
    <footer class="reddit-post__footer">
      <button class="reddit-post__action" (click)="toggleComments()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span>{{ post.commentsCount }} Comments</span>
      </button>

      <button class="reddit-post__action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        <span>Share</span>
      </button>

      <button class="reddit-post__action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Save</span>
      </button>

      <button class="reddit-post__action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"/>
          <circle cx="19" cy="12" r="1"/>
          <circle cx="5" cy="12" r="1"/>
        </svg>
      </button>
    </footer>

    <!-- Comments Section -->
    <div class="reddit-post__comments" *ngIf="showComments">
      <div class="reddit-comment-input">
        <img [src]="currentUser.avatarUrl" [alt]="currentUser.displayName" class="reddit-comment-input__avatar">
        <div class="reddit-comment-input__wrap">
          <textarea [(ngModel)]="newCommentText" placeholder="What are your thoughts?" rows="2"></textarea>
          <div class="reddit-comment-input__actions">
            <button (click)="addComment()" [disabled]="!newCommentText.trim()">Comment</button>
          </div>
        </div>
      </div>

      <div class="reddit-comments-list" *ngIf="post.comments?.length">
        <app-comment *ngFor="let comment of post.comments" [comment]="comment" [currentUser]="currentUser" (replyAdded)="onNestedReply($event)" (likeToggle)="onCommentLikeToggle(comment)">
        </app-comment>
      </div>
    </div>
  </div>
</article>
